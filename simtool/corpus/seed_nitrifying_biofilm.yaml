target_system: "iDynoMiCS 2 nitrifying biofilm reference model v0.1"

# PRISMA search steps, in order.
steps:
  - step_name: "Identification"
    description: >
      50 PMC esearch queries via NCBI E-utilities (open-access filter),
      covering nitrifying biofilms/granules, AOB/NOB/comammox kinetics,
      pure-culture nitrifier physiology, MABR, aerobic granular sludge,
      partial nitritation-anammox models, and targeted author/organism
      queries (Nitrospira inopinata, Kits, Daims, Spieck lineage).
    database: "PMC (NCBI E-utilities)"
    query: "multiple — see agent run log"
    n_in: 0
    n_out: 1242
    timestamp: "2026-04-18"
  - step_name: "Abstract screening"
    description: >
      esummary on 1242 unique PMC IDs, efetch for 448 on-topic titles,
      keyword-scored abstracts for Monod parameters (Ks/affinity, mu_max,
      yield, decay/maintenance, diffusion, density, EPS, biofilm model).
    database: "PMC (NCBI E-utilities)"
    n_in: 1242
    n_out: 46
    timestamp: "2026-04-18"

